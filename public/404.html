<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        // GitHub Pages SPA redirect for BrowserRouter.
        // Works for both:
        // - Custom domain root: https://eunicetao.space/<route>
        // - Project pages path: https://eunicetao.github.io/eunice-site/<route>
        //
        // Avoid redirect loops: if already redirected (p=), do nothing.
        if (l.search && l.search.indexOf('p=') !== -1) return;

        var repoName = 'eunice-site';
        var isProjectPages =
          l.pathname === '/' + repoName || l.pathname.indexOf('/' + repoName + '/') === 0;

        // Redirect target should be the site root for the current hosting mode.
        var baseRoot = isProjectPages ? '/' + repoName : '';

        // Preserve original path and query via encoded params.
        var p = encodeURIComponent(l.pathname);
        var q = encodeURIComponent(l.search || '');
        var redirect = baseRoot + '/?p=' + p + '&q=' + q + l.hash;

        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
