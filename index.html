<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>temp_project</title>
    <!-- GitHub Pages SPA fallback: recover path from 404 redirect -->
    <script>
      (function () {
        var l = window.location;
        if (!l.search) return;

        var params = new URLSearchParams(l.search);
        if (!params.has('p')) return;

        var p = params.get('p') || '';
        var q = params.get('q') || '';

        try {
          p = decodeURIComponent(p);
          q = decodeURIComponent(q);
        } catch {
          // ignore decode errors; best-effort cleanup below
        }

        // `q` includes leading "?" when present.
        window.history.replaceState(null, '', p + (q || '') + l.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
