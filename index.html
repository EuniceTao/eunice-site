<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>temp_project</title>
    <!-- GitHub Pages SPA fallback: recover path from 404 redirect -->
    <script>
      (function () {
        var l = window.location;
        if (l.search && l.search.startsWith('?/')) {
          var decoded = l.search
            .slice(2)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('&');
          window.history.replaceState(null, '', l.pathname + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
